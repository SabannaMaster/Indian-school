<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 40px; }
        h1 { color: #333; text-align: center; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 40px auto;
        }

        .file-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .file-card:hover { transform: translateY(-5px); }

        .file-icon { font-size: 50px; margin-bottom: 10px; }
        
        .file-name { font-weight: bold; display: block; margin-bottom: 15px; color: #555; }

        .btn-box { display: flex; justify-content: space-around; }

        .action-btn {
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        .view { background: #e3f2fd; color: #007bff; }
        .download { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>

    <h1>Resource Library</h1>

    <div class="grid-container">
        <div class="file-card">
            <div class="file-icon">📄</div>
            <span class="file-name">Business_Plan.pdf</span>
            <div class="btn-box">
                <a href="files/plan.pdf" target="_blank" class="action-btn view">View</a>
                <a href="files/plan.pdf" download class="action-btn download">Download</a>
            </div>
        </div>

        <div class="file-card">
            <div class="file-icon">📑</div>
            <span class="file-name">Invoice_Template.pdf</span>
            <div class="btn-box">
                <a href="files/invoice.pdf" target="_blank" class="action-btn view">View</a>
                <a href="files/invoice.pdf" download class="action-btn download">Download</a>
            </div>
        </div>

        <div class="file-card">
            <div class="file-icon">🖼️</div>
            <span class="file-name">Project_Image.jpg</span>
            <div class="btn-box">
                <a href="files/photo.jpg" target="_blank" class="action-btn view">View</a>
                <a href="files/photo.jpg" download class="action-btn download">Download</a>
            </div>
        </div>
    </div>

</body>
</html>
